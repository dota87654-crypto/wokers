<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Planner</title>
  <link href='/style.css' rel='stylesheet'>
  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w9buix6euw");
  </script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8Z40E1PLSS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8Z40E1PLSS');
  </script>
</head>
<body>
  <div class="page-wrapper">

    <!-- ===== DAILY PLANNER DASHBOARD ===== -->
    <section class="dashboard">
      <div class="dash-header">
        <h1 class="dash-title">Daily Planner</h1>
        <div class="dash-header-right">
          <span class="dash-date-text" id="dash-date"></span>
          <!-- 로그인된 경우 유저 정보 -->
          <div class="streak-badge" id="streak-badge" style="display:none;">
            🔥 <span id="streak-count">0</span>일 연속 출석
          </div>
          <div class="user-info" id="user-info" style="display:none;">
            <img class="user-avatar" id="user-avatar" alt="프로필" />
            <span class="user-name" id="user-name"></span>
            <button class="logout-btn" id="logout-btn">로그아웃</button>
          </div>
          <button class="contact-fab" id="open-contact-btn">✉ 문의하기</button>
        </div>
      </div>

      <!-- 로그인 오버레이 -->
      <div class="login-overlay" id="login-overlay">
        <div class="login-card">
          <div class="login-icon">📋</div>
          <h2 class="login-title">Daily Planner</h2>
          <p class="login-desc">로그인하면 어디서든<br>내 계획을 확인할 수 있습니다.</p>
          <button class="google-btn" id="google-login-btn">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Google로 로그인
          </button>
        </div>
      </div>

      <!-- 날씨 -->
      <div class="dash-weather" id="dash-weather">
        <span class="weather-loading">📍 위치 정보를 가져오는 중...</span>
      </div>

      <div class="dash-body">
        <!-- 달력 -->
        <div class="dash-calendar">
          <div class="cal-nav">
            <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
            <span class="cal-title" id="cal-title"></span>
            <button class="cal-nav-btn" id="cal-next">&#8250;</button>
            <button class="cal-add-btn" id="open-plan-add">+ 계획 등록</button>
          </div>
          <div class="cal-weekdays">
            <span class="sun">일</span><span>월</span><span>화</span>
            <span>수</span><span>목</span><span>금</span><span class="sat">토</span>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>

        <!-- 계획 목록 사이드바 -->
        <div class="plan-sidebar">
          <div class="plan-sidebar-header">
            <span class="todo-section-title">계획 목록</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <button class="tag-manage-btn" id="tag-manage-btn">🏷 태그</button>
              <div class="todo-filter">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="incomplete">미완료</button>
                <button class="filter-btn" data-filter="complete">완료</button>
              </div>
            </div>
          </div>
          <div id="todo-list"></div>
        </div>
      </div>
    </section>

    <!-- ===== 계획 등록 모달 ===== -->
    <div class="modal-overlay" id="plan-add-modal" aria-hidden="true">
      <div class="modal-box" role="dialog" aria-modal="true">
        <button class="modal-close" id="plan-add-close">✕</button>
        <h2 class="modal-title">계획 등록</h2>

        <!-- 미완료 계획 패널 -->
        <div class="incomplete-panel" id="incomplete-panel" style="display:none;">
          <div class="incomplete-panel-title">⚠ 미완료 계획</div>
          <div class="incomplete-list" id="incomplete-list"></div>
        </div>

        <div class="form-group" style="margin-top:16px;">
          <label for="todo-headline">제목</label>
          <input type="text" id="todo-headline" class="todo-input" placeholder="계획 제목을 입력하세요" autocomplete="off" />
        </div>
        <div class="form-group">
          <label for="todo-text">내용 <span style="color:#aaa;font-weight:400;">(선택)</span></label>
          <textarea id="todo-text" class="todo-content-input" placeholder="상세 내용을 입력하세요" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label for="todo-date-input">시작 날짜</label>
          <input type="date" id="todo-date-input" class="modal-date-input" />
        </div>
        <div class="form-group">
          <label>태그 <span style="color:#aaa;font-weight:400;">(선택)</span></label>
          <div class="tag-selector" id="tag-selector"></div>
        </div>

        <!-- 반복 계획 -->
        <div class="form-group">
          <label class="repeat-label">
            <input type="checkbox" id="repeat-toggle" class="repeat-checkbox" />
            <span>반복 계획</span>
          </label>
        </div>

        <div class="repeat-section" id="repeat-section">
          <div class="form-group" style="margin:0;">
            <label style="margin-bottom:8px;display:block;">반복 주기</label>
            <div class="repeat-type-grid">
              <button type="button" class="repeat-type-btn active" data-type="daily">매일</button>
              <button type="button" class="repeat-type-btn" data-type="3days">3일</button>
              <button type="button" class="repeat-type-btn" data-type="weekly">매주</button>
              <button type="button" class="repeat-type-btn" data-type="monthly">매달</button>
              <button type="button" class="repeat-type-btn" data-type="3months">3개월</button>
              <button type="button" class="repeat-type-btn" data-type="6months">반년</button>
              <button type="button" class="repeat-type-btn" data-type="custom">임의</button>
            </div>
          </div>

          <div class="form-group custom-interval-wrap" id="custom-interval-wrap" style="display:none;margin:0;">
            <label>반복 간격</label>
            <div class="custom-interval-row">
              <input type="number" id="custom-interval" min="1" max="365" value="2" />
              <span>일마다</span>
            </div>
          </div>

          <div class="form-group" style="margin:0;">
            <label for="repeat-end-date">반복 종료일</label>
            <input type="date" id="repeat-end-date" class="modal-date-input" />
          </div>

          <div class="repeat-preview" id="repeat-preview"></div>
        </div>

        <button class="todo-add-btn" id="todo-add-btn" style="width:100%;padding:12px;margin-top:4px;">추가하기</button>
      </div>
    </div>

    <!-- ===== 태그 관리 모달 ===== -->
    <div class="modal-overlay" id="tag-manage-modal" aria-hidden="true">
      <div class="modal-box" role="dialog" aria-modal="true" style="max-width:400px;">
        <button class="modal-close" id="tag-manage-close">✕</button>
        <h2 class="modal-title">태그 관리</h2>

        <div class="tag-manage-list" id="tag-manage-list"></div>

        <div class="tag-create-section">
          <div class="form-group">
            <label for="tag-name-input">새 태그 이름</label>
            <input type="text" id="tag-name-input" class="todo-input" placeholder="태그 이름 입력" autocomplete="off" />
          </div>
          <div class="form-group">
            <label>색상 선택</label>
            <div class="tag-color-picker" id="tag-color-picker"></div>
          </div>
          <button class="todo-add-btn" id="tag-create-btn" style="width:100%;">태그 추가</button>
        </div>
      </div>
    </div>

    <!-- ===== 날짜별 계획 팝업 ===== -->
    <div class="modal-overlay" id="plan-modal" aria-hidden="true">
      <div class="modal-box plan-modal-box" role="dialog" aria-modal="true">
        <button class="modal-close" id="plan-modal-close">✕</button>
        <div class="plan-modal-date" id="plan-modal-date"></div>
        <div class="plan-modal-list" id="plan-modal-list"></div>
      </div>
    </div>

    <!-- ===== 제휴 문의 모달 ===== -->
    <div class="modal-overlay" id="contact-modal" aria-hidden="true">
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" id="close-contact-btn" aria-label="닫기">✕</button>
        <h2 class="modal-title" id="modal-title">제휴 문의</h2>
        <p class="modal-subtitle">아래 양식을 작성해 주시면 빠르게 연락드리겠습니다.</p>

        <!-- 전송 완료 메시지 -->
        <div class="modal-success" id="modal-success" style="display:none;">
          <div class="success-icon">✓</div>
          <div class="success-title">문의가 접수되었습니다!</div>
          <div class="success-desc">빠른 시일 내로 회신 드리겠습니다.</div>
          <button class="submit-btn" id="success-close-btn" style="margin-top:20px;">닫기</button>
        </div>

        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <label for="c-name">이름 / 회사명</label>
            <input type="text" id="c-name" name="name" placeholder="홍길동 / (주)회사명" required />
          </div>
          <div class="form-group">
            <label for="c-email">이메일</label>
            <input type="email" id="c-email" name="email" placeholder="example@email.com" required />
          </div>
          <div class="form-group">
            <label for="c-phone">연락처</label>
            <input type="tel" id="c-phone" name="phone" placeholder="010-0000-0000" />
          </div>
          <div class="form-group">
            <label for="c-type">문의 유형</label>
            <select id="c-type" name="type" required>
              <option value="" disabled selected>선택해 주세요</option>
              <option value="광고/마케팅">광고 / 마케팅</option>
              <option value="콘텐츠 제휴">콘텐츠 제휴</option>
              <option value="기술 협력">기술 협력</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label for="c-message">문의 내용</label>
            <textarea id="c-message" name="message" rows="4" placeholder="문의 내용을 입력해 주세요." required></textarea>
          </div>
          <button type="submit" class="submit-btn" id="contact-submit-btn">문의 보내기</button>
        </form>
      </div>
    </div>


  </div><!-- /.page-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
