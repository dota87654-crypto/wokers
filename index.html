<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴 문의</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>제휴 문의</h1>
    <p class="subtitle">아래 양식을 작성해 주시면 빠르게 연락드리겠습니다.</p>

    <form action="https://formspree.io/f/xjgpqyyw" method="POST" class="contact-form">
      <div class="form-group">
        <label for="name">이름 / 회사명</label>
        <input type="text" id="name" name="name" placeholder="홍길동 / (주)회사명" required />
      </div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>

      <div class="form-group">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>

      <div class="form-group">
        <label for="type">문의 유형</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>선택해 주세요</option>
          <option value="광고/마케팅">광고 / 마케팅</option>
          <option value="콘텐츠 제휴">콘텐츠 제휴</option>
          <option value="기술 협력">기술 협력</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="문의 내용을 입력해 주세요." required></textarea>
      </div>

      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
